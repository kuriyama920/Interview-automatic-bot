name = "interview-bot-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[placement]
mode = "smart"

# カスタムドメイン: 現在 workers.dev サブドメインを使用
# URL: interview-bot-api.interviewautomaticbot92.workers.dev
# routes = [
#   { pattern = "interview-bot-api.interviewautomaticbot92.workers.dev", custom_domain = true }
# ]

[triggers]
crons = ["0 0 1 * *"]

# Cloudflare AI Gateway
# CF_ACCOUNT_ID と CF_AI_GATEWAY_ID は Cloudflare Dashboard > Workers > Settings > Variables で設定
# または: npx wrangler secret put CF_ACCOUNT_ID / npx wrangler secret put CF_AI_GATEWAY_ID
[vars]
CF_AI_GATEWAY_ID = "interview-bot-gw"
