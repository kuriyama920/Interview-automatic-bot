name: Daily Short Video

on:
  schedule:
    # JST 10:00 (UTC 01:00) - 日本のSNSユーザーが活発な時間帯
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      template_type:
        description: 'テンプレート (auto=カレンダーに従う)'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - feature-highlight
          - demo-showcase
          - stats-promo
          - tip-of-day
          - testimonial
      platforms:
        description: '投稿先プラットフォーム (カンマ区切り)'
        required: false
        default: 'youtube'
      sns_platforms:
        description: 'SNS投稿先 (x,instagram,tiktok) ※空=スキップ'
        required: false
        default: ''
      dry_run:
        description: '生成のみ（投稿しない）'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      video_generated: ${{ steps.generate.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Chromium (for Remotion)
        run: npx playwright install chromium --with-deps

      - name: Install dependencies
        working-directory: tools/video-shorts
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Approve build scripts
        working-directory: tools/video-shorts
        run: pnpm approve-builds --all || true

      - name: Generate and Post
        id: generate
        working-directory: tools/video-shorts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          TEMPLATE="${{ github.event.inputs.template_type || 'auto' }}"
          PLATFORMS="${{ github.event.inputs.platforms || 'youtube' }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          CMD="npx tsx src/index.ts generate-and-post --platforms=${PLATFORMS}"

          if [ "$TEMPLATE" != "auto" ]; then
            CMD="${CMD} --template=${TEMPLATE}"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            CMD="${CMD} --dry-run"
          fi

          echo "Running: ${CMD}"
          eval ${CMD}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-${{ github.run_id }}
          path: tools/video-shorts/output/
          retention-days: 7
          if-no-files-found: ignore

      # --- SNS投稿 (Python sns-uploader) ---
      - name: Setup Python
        if: ${{ github.event.inputs.sns_platforms != '' && github.event.inputs.dry_run != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sns-uploader dependencies
        if: ${{ github.event.inputs.sns_platforms != '' && github.event.inputs.dry_run != 'true' }}
        working-directory: tools/sns-uploader
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (for TikTok)
        if: ${{ contains(github.event.inputs.sns_platforms, 'tiktok') && github.event.inputs.dry_run != 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Restore SNS sessions
        if: ${{ github.event.inputs.sns_platforms != '' && github.event.inputs.dry_run != 'true' }}
        working-directory: tools/sns-uploader
        run: |
          mkdir -p sessions
          if [ -n "$X_COOKIES_JSON" ]; then
            echo "$X_COOKIES_JSON" > sessions/x_cookies.json
            echo "X: Cookie restored"
          fi
          if [ -n "$IG_SESSION_JSON" ]; then
            echo "$IG_SESSION_JSON" > sessions/ig_session.json
            echo "Instagram: Session restored"
          fi
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          IG_SESSION_JSON: ${{ secrets.IG_SESSION_JSON }}

      - name: Post to SNS platforms
        if: ${{ github.event.inputs.sns_platforms != '' && github.event.inputs.dry_run != 'true' }}
        working-directory: tools/sns-uploader
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
          PROXY_URL: ${{ secrets.SNS_PROXY_URL }}
        run: |
          SNS_PLATFORMS="${{ github.event.inputs.sns_platforms }}"
          echo "SNS投稿先: ${SNS_PLATFORMS}"
          python main.py post-latest --platforms="${SNS_PLATFORMS}"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0]
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Video Shorts] ${date} の動画生成が失敗しました`,
              body: `Daily Short Video ワークフローが失敗しました。\n\n` +
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                `確認してください。`,
              labels: ['bug', 'video-shorts']
            })
